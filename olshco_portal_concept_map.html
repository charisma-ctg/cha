<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OLSHCO College Portal – Concept Map</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    padding: 24px 16px;
    min-height: 100vh;
  }
  h1 {
    font-size: 18px; font-weight: 500;
    text-align: center; margin-bottom: 4px;
    color: #1a1a18;
  }
  .subtitle {
    font-size: 13px; color: #6b6a64;
    text-align: center; margin-bottom: 16px;
  }
  #tabs {
    display: flex; gap: 8px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 14px;
  }
  .tab-btn {
    padding: 5px 14px; font-size: 12px; border-radius: 20px;
    border: 0.5px solid #b4b2a9;
    background: #fff; color: #5f5e5a;
    cursor: pointer; transition: all .15s;
    font-family: inherit;
  }
  .tab-btn:hover { background: #e8e6df; color: #1a1a18; }
  .tab-btn.active { background: #1a1a18; color: #fff; border-color: transparent; }
  .map-wrap { overflow-x: auto; }
  svg { display: block; max-width: 100%; }
  .node { cursor: pointer; }
  .node:hover > rect, .node:hover > circle { opacity: 0.8; }
  #info-box {
    margin-top: 14px;
    min-height: 64px; padding: 12px 16px;
    background: #fff;
    border-radius: 8px;
    font-size: 13px; color: #5f5e5a;
    line-height: 1.6;
    border-left: 3px solid #888780;
    transition: border-color .2s;
    max-width: 760px; margin-left: auto; margin-right: auto;
  }
  #info-title { font-weight: 500; font-size: 14px; color: #1a1a18; margin-bottom: 3px; }

  /* ── color ramps ── */
  .c-purple rect, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text { fill: #3C3489; }
  .c-coral  rect, .c-coral  circle { fill: #FAECE7; stroke: #993C1D; }
  .c-coral  text { fill: #712B13; }
  .c-teal   rect, .c-teal   circle { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal   text { fill: #085041; }
  .c-blue   rect, .c-blue   circle { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue   text { fill: #0C447C; }
  .c-amber  rect, .c-amber  circle { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber  text { fill: #633806; }
  .c-green  rect, .c-green  circle { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green  text { fill: #27500A; }

  /* text helpers */
  .th { font-size: 14px; font-weight: 500; fill: #1a1a18; }
  .ts { font-size: 12px; fill: #5f5e5a; }
  .tl { font-size: 10px; fill: #888780; }

  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1a; color: #e0dfd7; }
    h1 { color: #e0dfd7; }
    .subtitle { color: #888780; }
    .tab-btn { background: #2c2c2a; color: #b4b2a9; border-color: #444441; }
    .tab-btn:hover { background: #3d3d3a; color: #e0dfd7; }
    .tab-btn.active { background: #e0dfd7; color: #1c1c1a; }
    #info-box { background: #2c2c2a; color: #888780; border-left-color: #444441; }
    #info-title { color: #e0dfd7; }
    .c-purple rect, .c-purple circle { fill: #3C3489; stroke: #AFA9EC; }
    .c-purple text { fill: #CECBF6; }
    .c-coral  rect, .c-coral  circle { fill: #712B13; stroke: #F0997B; }
    .c-coral  text { fill: #F5C4B3; }
    .c-teal   rect, .c-teal   circle { fill: #085041; stroke: #5DCAA5; }
    .c-teal   text { fill: #9FE1CB; }
    .c-blue   rect, .c-blue   circle { fill: #0C447C; stroke: #85B7EB; }
    .c-blue   text { fill: #B5D4F4; }
    .c-amber  rect, .c-amber  circle { fill: #633806; stroke: #EF9F27; }
    .c-amber  text { fill: #FAC775; }
    .c-green  rect, .c-green  circle { fill: #27500A; stroke: #97C459; }
    .c-green  text { fill: #C0DD97; }
    .th { fill: #e0dfd7; }
    .ts { fill: #b4b2a9; }
    .tl { fill: #5f5e5a; }
  }
</style>
</head>

<div id="info-box">
  <div id="info-title">👆 Click any node to learn what it does</div>
  <div id="info-desc">Use the filter buttons above to highlight a specific module.</div>
</div>

<script>
  function showInfo(title, desc, color) {
    document.getElementById('info-title').textContent = title;
    document.getElementById('info-desc').textContent = desc;
    document.getElementById('info-box').style.borderLeftColor = color || '#888780';
  }

  function highlight(btn, group) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('[data-group]').forEach(el => {
      el.style.opacity = (el.dataset.group === group || el.dataset.group === 'center') ? '1' : '0.15';
    });
    const names = {
      academic: 'Academic Module', finance: 'Finance Module',
      services: 'Student Services', admin: 'Admin & Security',
      comms: 'Communication', library: 'Library & Resources'
    };
    const descs = {
      academic: 'Showing: Enrollment, Grades & CoG, and Class Schedules.',
      finance:  'Showing: Tuition & Fees, Online Payment, and Scholarships.',
      services: 'Showing: Document Requests, Guidance Office, and Health Services.',
      admin:    'Showing: User Management, Reports & Analytics, and Audit Logs.',
      comms:    'Showing: Announcements, Internal Messaging, and Academic Calendar.',
      library:  'Showing: OPAC, E-Library, and Learning Management System (LMS).'
    };
    document.getElementById('info-title').textContent = names[group] || '';
    document.getElementById('info-desc').textContent = descs[group] || '';
    document.getElementById('info-box').style.borderLeftColor = '#888780';
  }

  function showAll(btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('[data-group]').forEach(el => { el.style.opacity = '1'; });
    document.getElementById('info-title').textContent = '👆 Click any node to learn what it does';
    document.getElementById('info-desc').textContent = 'Use the filter buttons above to highlight a specific module.';
    document.getElementById('info-box').style.borderLeftColor = '#888780';
  }
</script>
</body>
</html>
